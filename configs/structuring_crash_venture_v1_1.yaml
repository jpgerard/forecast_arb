# ============================================================================
# CRASH VENTURE V1.1 - FROZEN CONFIGURATION
# ============================================================================
# DO NOT MODIFY: This configuration is locked for Campaign "Crash Venture v1.1"
# Any modification will result in a new campaign ID via checksum validation
# 
# Purpose: Generate 1-3 clean, executable SPY put-spread trade candidates
# Aligned to SPY strike grid ($10 increments far OTM) and observed liquidity
# ============================================================================

campaign_name: "crash_venture_v1_1"

# Structuring parameters (FROZEN - NO OVERRIDES)
structuring:
  # Underlier constraint
  underlier: "SPY"
  
  # Days to expiration range
  dte_range_days:
    min: 30
    max: 60
  
  # Target moneyness levels (negative = OTM puts)
  # Aligned to SPY liquidity zones: 8-15% OTM where volume is concentrated
  moneyness_targets:
    - -0.08  # 8% OTM
    - -0.10  # 10% OTM
    - -0.12  # 12% OTM
    - -0.15  # 15% OTM
  
  # Spread widths in dollars
  # Aligned to SPY strike grid ($10 increments far OTM)
  # Removed 5 and 15 - use standard 10 and 20
  spread_widths:
    - 10
    - 20
  
  # Risk constraints
  constraints:
    max_loss_usd_per_trade: 500
    max_candidates_evaluated: 30
    top_n_output: 3
    min_open_interest: 300  # Reduced from 500 for broader coverage
    max_option_spread_pct: 0.25
  
  # Monte Carlo simulation
  monte_carlo:
    paths: 30000
    seed_mode: "run_id"  # Derive seed from run_id for determinism
  
  # Optimization objective
  objective: "max_ev_per_dollar"  # Maximize expected value per dollar risked
  
  # Edge gating (options-implied baseline)
  edge_gating:
    event_moneyness: -0.15  # Event threshold: 15% below spot
    min_edge: 0.05  # Minimum edge required (p_external - p_implied)
    min_confidence: 0.6  # Minimum confidence in p_implied estimate
  
  # Output format
  output:
    structures_json: true
    summary_md: true
    dry_run_tickets: true

# Logging
logging:
  level: "INFO"

# Storage
storage:
  path: "runs/forecasts.db"

# Version tracking (for checksum validation)
config_version: "1.1.0"
config_frozen_date: "2026-01-28"
config_notes: "Aligned to SPY strike grid and liquidity - uses $10/$20 widths and 8-15% OTM with lower min OI"
